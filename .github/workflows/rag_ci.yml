name: RAG Evaluation and CI Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rag-evaluation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ingest Knowledge Base
      run: |
        python -c "import sys, os; sys.path.append('src'); from retrieval.vector_store import VectorStoreManager; from ingestion.document_loader import UniversalDocumentLoader; from ingestion.chunker import DocumentChunker; db = VectorStoreManager(); loader = UniversalDocumentLoader(); docs = loader.load_document('data/sample_doc.md'); chunked = DocumentChunker(chunk_size=500, chunk_overlap=100).chunk_documents(docs); db.add_documents(chunked); db.close()"

    - name: Run Ragas Offline Evaluation
      env:
        GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        USE_TORCH: "1"
        USE_TF: "0"
        VECTOR_DB_PROVIDER: "chroma"
      run: |
        python scripts/evaluate_rag.py

    - name: Run CI Quality Gate
      run: |
        python scripts/ci_quality_gate.py
